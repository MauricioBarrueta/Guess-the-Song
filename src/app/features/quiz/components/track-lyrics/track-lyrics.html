<div class="w-full h-full flex justify-center items-center flex-wrap p-2">

  <p class="w-full text-center mb-3 bg-white text-black">
    @if (isLoadingLyrics) {
      <p>🔎 Buscando la letra...</p>
    } @else if (!isLyricsAvailable) {
      <p>🚫 Pista no disponible para esta canción.</p>
    } @else if (!hasViewedLyrics) {
      <p>⚠️ Solo tienes una oportunidad para ver la pista.</p>
    } @else {
      <p>✅ Ya utilizizaste tu pista.</p>
    }
  </p>

  <button
    class="rounded border border-black py-2 px-4 mt-4 cursor-pointer disabled:bg-gray-200"
      [disabled]="isLoadingLyrics || !isLyricsAvailable || hasViewedLyrics" (click)="openModal()">
    Ver pista
  </button>



</div>

  <!--! ESTE SE QUITA, Y gameService SE CAMBIA A private -->
  <button class="cursor-pointer border border-black bg-white text-black" (click)="gameService.clearLyricsCache()">Borrar caché</button>
